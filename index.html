<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherMind: NeuroSync</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#05070a">
    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #00f2ff;
            --correct: #39ff14; /* O */
            --misplaced: #f4ea17; /* X */
            --danger: #ff0055;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg);
            color: #e2e8f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Effetto Griglia Sfondo */
        body::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .card {
            width: 90%;
            max-width: 450px;
            background: rgba(10, 15, 25, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--accent);
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
            position: relative;
        }

        /* Schermi */
        .screen { display: none; animation: scanline 0.4s ease-out; }
        .screen.active { display: block; }

        @keyframes scanline {
            from { opacity: 0; transform: scale(0.98); filter: brightness(2); }
            to { opacity: 1; transform: scale(1); filter: brightness(1); }
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        h1 { font-size: 1.6rem; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); margin-top: 0; text-shadow: 0 0 10px var(--accent); }

        .btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 12px;
            width: 100%;
            margin-bottom: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .btn:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 20px var(--accent); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Story & Boot */
        .story-img {
            width: 100%;
            height: 160px;
            background: #000;
            border: 1px dashed var(--accent);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.7rem;
            overflow: hidden;
        }

        .boot-terminal {
            background: rgba(0,0,0,0.6);
            padding: 15px;
            text-align: left;
            min-height: 120px;
            font-size: 0.8rem;
            border: 1px solid rgba(0,242,255,0.2);
        }

        .scan-line { overflow: hidden; white-space: nowrap; border-right: 2px solid var(--accent); width: 0; animation: typing 0.6s steps(30, end) forwards; margin-bottom: 4px; }
        @keyframes typing { from { width: 0 } to { width: 100% } }

        /* Game UI */
        .specs-box { font-size: 0.75rem; color: var(--accent); text-align: left; margin-bottom: 15px; border-left: 2px solid var(--accent); padding-left: 10px; line-height: 1.4; }
        .attempts-badge { font-size: 1.1rem; color: var(--danger); margin: 10px 0; font-weight: bold; }
        
        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--accent);
            color: white;
            font-size: 2.2rem;
            text-align: center;
            width: 90%;
            letter-spacing: 8px;
            outline: none;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .history { max-height: 180px; overflow-y: auto; margin-top: 10px; border-top: 1px solid var(--glass); }
        .attempt { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--glass); font-family: monospace; }
        .o { color: var(--correct); text-shadow: 0 0 5px var(--correct); }
        .x { color: var(--misplaced); text-shadow: 0 0 5px var(--misplaced); }

        .grid-levels { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
        .lvl-node { padding: 10px; border: 1px solid var(--glass); cursor: pointer; transition: 0.3s; }
        .lvl-node.locked { opacity: 0.2; cursor: not-allowed; }
        .lvl-node.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

<div class="card" id="main-card">
    
    <div id="screen-menu" class="screen active">
        <h1>NEUROSYNC_OS</h1>
        <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 2rem;">SISTEMA DI DECRIPTAZIONE ATTIVO</p>
        <button class="btn" onclick="showScreen('screen-levels')">Nodi Sequenza (Livelli)</button>
        <button class="btn" onclick="showScreen('screen-fast-config')">Infiltrazione Rapida</button>
    </div>

    <div id="screen-levels" class="screen">
        <h3>ARCHIVIO_NODI</h3>
        <div class="grid-levels" id="levels-grid"></div>
        <button class="btn" onclick="showScreen('screen-menu')">Indietro</button>
    </div>

    <div id="screen-story" class="screen">
        <h2 id="story-title" style="color: var(--accent)">NODO_01</h2>
        <div class="story-img" id="story-img">[CARICAMENTO_VISUALE...]</div>
        <p id="story-text" style="font-size: 0.85rem; line-height: 1.5; min-height: 60px; margin-bottom: 20px;"></p>
        <button class="btn" onclick="runBootSequence()">Inizia Scansione Hacker</button>
    </div>

    <div id="screen-boot" class="screen">
        <h2 style="font-size: 1rem; color: var(--accent);">ATTACCO BRUTE-FORCE IN CORSO...</h2>
        <div class="boot-terminal" id="boot-terminal"></div>
    </div>

    <div id="screen-fast-config" class="screen">
        <h3>CONFIG_RAPIDA</h3>
        <select id="fast-diff" class="btn" style="background: var(--bg); color: var(--accent);">
            <option value="easy">FACILE (3 Numeri)</option>
            <option value="med">MEDIO (4 Numeri)</option>
            <option value="hard">DIFFICILE (5 Alfanum)</option>
            <option value="ext">ESTREMO (6 Alfanum)</option>
        </select>
        <div style="display: flex; gap: 10px;">
            <button class="btn" onclick="setupFast('zen')">MOD_ZEN</button>
            <button class="btn" onclick="setupFast('challenge')">MOD_SFIDA</button>
        </div>
        <button class="btn" onclick="showScreen('screen-menu')">Indietro</button>
    </div>

    <div id="screen-game" class="screen">
        <div id="game-specs" class="specs-box"></div>
        <div id="attempts-display" class="attempts-badge">VITE: --</div>
        <input type="text" id="guessInput" autocomplete="off" spellcheck="false" placeholder="****">
        <button class="btn" onclick="makeGuess()">Invia Segnale</button>
        <div class="history" id="history"></div>
        <button onclick="showScreen('screen-menu')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:0.7rem; margin-top:15px;">ABORTIRE MISSIONE</button>
    </div>

    <div id="screen-result" class="screen">
        <h2 id="res-title">STATUS</h2>
        <p id="res-text" style="margin-bottom: 30px;"></p>
        <button id="btn-next" class="btn">Prossimo Nodo</button>
        <button class="btn" onclick="showScreen('screen-menu')">Torna al Menu</button>
    </div>

</div>

<script>
    // Configurazione 10 Livelli
    const levels = [
        { l:1, len:3, ch:"0123456789", att:15, story:"Sorgente trovata. È un vecchio server di backup. La chiave è semplice, un buon inizio." },
        { l:2, len:3, ch:"0123456789", att:10, story:"Il sistema di raffreddamento ha una falla. Devi decriptare il comando per aprirla." },
        { l:3, len:4, ch:"0123456789", att:15, story:"Firewall primario rilevato. Il codice si allunga. Senti il ronzio dell'elettricità." },
        { l:4, len:4, ch:"0123456789", att:12, story:"La sicurezza ha notato un'anomalia. Hai meno tentativi prima che traccino l'IP." },
        { l:5, len:4, ch:"0123456789ABC", att:15, story:"Modulo Alfanumerico. L'IA sta iniziando a mescolare lettere e numeri. Complesso." },
        { l:6, len:4, ch:"0123456789ABCDEF", att:12, story:"Sei nel database della Ricerca. I dati qui sono frammentati e protetti da esadecimali." },
        { l:7, len:5, ch:"0123456789", att:15, story:"Settore Logistica. Una lunga stringa numerica ti separa dai piani di NeuroSync." },
        { l:8, len:5, ch:"0123456789ABCDE", att:12, story:"L'IA ti parla nel terminale: 'Perché vuoi fermare l'evoluzione?'. Non ascoltare." },
        { l:9, len:6, ch:"0123456789", att:15, story:"Sei vicinissimo al Core. La complessità è massima, il tempo stringe." },
        { l:10, len:6, ch:"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789", att:12, story:"CUORE DI NEUROSYNC. L'ultima barriera. Decifra l'impossibile e spegni tutto." }
    ];

    let gameState = { secret: "", attempts: 0, config: null, mode: "", isZen: false };
    let unlocked = parseInt(localStorage.getItem('neuro_save')) || 1;

    // Navigazione
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-levels') renderLevels();
    }

    function renderLevels() {
        const grid = document.getElementById('levels-grid');
        grid.innerHTML = "";
        levels.forEach(lvl => {
            const div = document.createElement('div');
            div.className = `lvl-node ${lvl.l > unlocked ? 'locked' : (lvl.l === unlocked ? 'active' : '')}`;
            div.innerText = lvl.l;
            if(lvl.l <= unlocked) div.onclick = () => {
                gameState.config = lvl;
                gameState.mode = 'levels';
                gameState.isZen = false;
                document.getElementById('story-title').innerText = "NODO_" + String(lvl.l).padStart(2, '0');
                document.getElementById('story-text').innerText = lvl.story;
                showScreen('screen-story');
            };
            grid.appendChild(div);
        });
    }

    // Hacker Boot Sequence
    function runBootSequence() {
        showScreen('screen-boot');
        const term = document.getElementById('boot-terminal');
        term.innerHTML = "";
        const c = gameState.config;
        
        const logs = [
            "> INIZIALIZZAZIONE BYPASS...",
            "> ANALISI PROTOCOLLO NEUROSYNC...",
            `> LUNGHEZZA RILEVATA: [${c.len} UNITÀ]`,
            `> CHARSET ESTRATTO: [${c.ch.length} SIMBOLI]`,
            "> RECOLA DUPLICATI: [NON AMMESSI]",
            "> ACCESSO GARANTITO. AVVIO..."
        ];

        logs.forEach((msg, i) => {
            setTimeout(() => {
                const p = document.createElement('div');
                p.className = "scan-line";
                p.innerText = msg;
                term.appendChild(p);
                if(i === logs.length -1) setTimeout(() => initGame(), 800);
            }, i * 600);
        });
    }

    function setupFast(type) {
        const d = document.getElementById('fast-diff').value;
        const cfgs = {
            easy: { len:3, ch:"0123456789", att:15, n:"FACILE" },
            med:  { len:4, ch:"0123456789", att:12, n:"MEDIO" },
            hard: { len:5, ch:"0123456789ABCDEF", att:12, n:"DIFFICILE" },
            ext:  { len:6, ch:"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789", att:10, n:"ESTREMO" }
        };
        gameState.config = cfgs[d];
        gameState.mode = 'fast';
        gameState.isZen = (type === 'zen');
        runBootSequence();
    }

    // Logica Gioco
    function initGame() {
        const c = gameState.config;
        gameState.attempts = c.att;
        gameState.secret = "";
        let pool = c.ch.split("");
        for(let i=0; i<c.len; i++) {
            gameState.secret += pool.splice(Math.floor(Math.random()*pool.length), 1);
        }

        document.getElementById('game-specs').innerHTML = `
            SISTEMA: ${gameState.mode === 'levels' ? 'NODO_'+c.l : 'FAST_'+c.n}<br>
            CHIAVE: ${c.len} CARATTERI | NO DUPLICATI<br>
            CHARSET: <span style="color:var(--correct)">${c.ch}</span>
        `;
        document.getElementById('attempts-display').innerText = gameState.isZen ? "MODALITÀ ZEN" : "VITE: " + gameState.attempts;
        document.getElementById('attempts-display').style.color = gameState.isZen ? "var(--accent)" : "var(--danger)";
        document.getElementById('history').innerHTML = "";
        document.getElementById('guessInput').value = "";
        document.getElementById('guessInput').maxLength = c.len;
        document.getElementById('guessInput').placeholder = "?".repeat(c.len);
        
        showScreen('screen-game');
        document.getElementById('guessInput').focus();
        console.log("Backdoor:", gameState.secret);
    }

    function makeGuess() {
        const input = document.getElementById('guessInput');
        const val = input.value.toUpperCase();
        const card = document.getElementById('main-card');

        // Validazione
        if(val.length !== gameState.config.len || new Set(val).size !== val.length) {
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);
            return;
        }

        let o = 0, x = 0;
        for(let i=0; i<val.length; i++) {
            if(val[i] === gameState.secret[i]) o++;
            else if(gameState.secret.includes(val[i])) x++;
        }

        const div = document.createElement('div');
        div.className = 'attempt';
        div.innerHTML = `<span>${val}</span><div>${'<span class="o">O</span>'.repeat(o)}${'<span class="x">X</span>'.repeat(x)}</div>`;
        document.getElementById('history').prepend(div);
        input.value = "";

        if(o === gameState.config.len) {
            finish(true);
        } else if(!gameState.isZen) {
            gameState.attempts--;
            document.getElementById('attempts-display').innerText = "VITE: " + gameState.attempts;
            if(gameState.attempts <= 0) finish(false);
        }
    }

    function finish(win) {
        showScreen('screen-result');
        const next = document.getElementById('btn-next');
        if(win) {
            document.getElementById('res-title').innerText = "SUCCESSO";
            document.getElementById('res-text').innerText = "Accesso al nodo garantito. Sequenza violata.";
            if(gameState.mode === 'levels' && gameState.config.l === unlocked && unlocked < 10) {
                unlocked++;
                localStorage.setItem('neuro_save', unlocked);
            }
            next.style.display = (gameState.mode === 'levels' && gameState.config.l < 10) ? "block" : "none";
            next.onclick = () => {
                gameState.config = levels.find(l => l.l === gameState.config.l + 1);
                document.getElementById('story-title').innerText = "NODO_" + String(gameState.config.l).padStart(2, '0');
                document.getElementById('story-text').innerText = gameState.config.story;
                showScreen('screen-story');
            };
        } else {
            document.getElementById('res-title').innerText = "FALLIMENTO";
            document.getElementById('res-text').innerText = "Segnale tracciato. Disconnessione forzata. La chiave era: " + gameState.secret;
            next.style.display = "none";
        }
    }

    // Listener Invio
    document.getElementById('guessInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') makeGuess();
    });

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }
</script>

</body>
</html>
